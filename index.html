const BEST_CHOICES = {
  "DP_En1::base": { bestIndex: 2, explanation: "Priya's underlying worry — that over-planning erodes the speed advantage adaptive delivery is supposed to provide — is legitimate, but neither of the other two options actually protects that speed; they just spend it on the wrong thing. Unilaterally deciding the vision itself resolves the ambiguity but replaces one unvalidated source (Priya's whiteboard) with another (the PM's own judgment) — Hollis, the only person who actually knows what AeroVolt needs, still never enters the conversation. Letting engineering start building the most technically interesting pieces without a settled vision doesn't avoid the planning Priya's worried about; it just defers it until after real engineering hours are already sunk into work that may not survive contact with an actual customer conversation. A short, structured session with the one person who can validate the vision against real need is the only option that resolves the ambiguity using actual evidence rather than someone's confident guess, and it's genuinely fast — a session, not a months-long planning phase." },
  "DP_En2::base": { bestIndex: 1, explanation: "Dr. Osei's actual point isn't that agile delivery is incompatible with regulatory scrutiny — it's that documentation deferred until 'the architecture stabilizes' tends to never quite get produced with the fidelity an audit needs, because the specific reasoning behind an early decision is hardest to reconstruct after the fact. Proceeding with standard Scrum and handling documentation retroactively treats the compliance need as separable from the delivery process, when Dr. Osei has just explained why, for this specific kind of safety-relevant code, it isn't. Escalating to Marcus to negotiate an exception asks a sponsor who has already shown he wants speed over process to overrule a subject-matter expert's stated regulatory concern — a real risk if that exception later turns out not to have been Marcus's to grant. Building lightweight, continuous evidence into the Definition of Done is the actual definition of tailoring: it doesn't abandon the two-week cycle, it changes what 'done' means within that cycle so the paper trail gets produced as a byproduct of normal work rather than as a separate effort no one will prioritize later." },
  "DP_En3::base": { bestIndex: 2, explanation: "Rosa's one-sentence objection ('there are two of us') is a real signal about fit, not an argument for having no structure at all — a team with zero agreed norms discovers its disagreements at the worst possible moment, mid-sprint, which is exactly the failure mode working agreements exist to prevent. Keeping the full five-ceremony structure unchanged treats consistency with a textbook process as more important than whether that process actually fits a team this size, which is the opposite of tailoring. Dropping structure entirely and letting things emerge informally overcorrects in the other direction: it avoids ceremony for ceremony's sake but leaves the two most likely sources of friction — decision rights and availability expectations — completely undefined until they cause a problem. Co-creating a right-sized set of agreements with Rosa directly addresses what she actually said, and working agreements that the team writes together are also, by design, agreements the team is far more likely to actually follow than ones handed down." },
  "DP_En4::base": { bestIndex: 1, explanation: "Renata's real question wasn't whether the software squad should be accountable — it was what accountability should look like for something that changes scope on a two-week cycle, and a fixed year-long budget answers a question she didn't ask by importing a governance model built for fixed, known scope onto a project that, by its own charter, doesn't have that yet. Avoiding the conversation and deferring the mechanics to Dana doesn't resolve Renata's actual concern; it just delays the moment she has to ask it again, likely with less patience the second time. An incremental funding model with a real continue/stop decision at each milestone gives Renata exactly the kind of accountability she asked for — evidence-based checkpoints — without forcing scope to be pretended-fixed before anyone has validated what's actually worth building." },
  "DP_Sp1::base": { bestIndex: 1, explanation: "Tom's underlying worry is legitimate \u2014 AeroVolt does need to see progress \u2014 but a dashboard wired to placeholder data doesn't actually address that worry once anyone looks closely; it produces something to demo, not something that proves the product works. Building the dashboard first also means the team validates its least risky, least uncertain component while the item everyone actually depends on \u2014 the autonomy engine \u2014 stays unstarted. Splitting capacity across both items in parallel feels fair to both stakeholders but violates a basic flow principle for a two-person team: nothing finishes, both threads move at half speed, and Marcus still has nothing real to show at the end of it. A thin, minimal version of the autonomy engine is both the highest-uncertainty item and the one the dashboard is meaningless without \u2014 tackling it first reduces the biggest risk and still produces something demonstrable, since even a minimal working engine can drive a minimal real dashboard." },
  "DP_Sp2::base": { bestIndex: 1, explanation: "Priya's internal draft would move fastest, but the story map's entire value comes from reflecting a real user's actual workflow \u2014 and Priya, however experienced, is not the user; she is guessing at Hollis's ops center the same way she was guessing when she built the six-item wishlist back in Envision. Skipping story mapping entirely and going straight to a flat backlog list doesn't remove the need for that understanding, it just removes the one artifact designed to organize it, making it far more likely the backlog ends up prioritized by volume of opinion rather than by actual journey. A short session with Hollis costs little and replaces assumption with the one thing that actually validates a story map: the real sequence of what the end user does, in her own words." },
  "DP_Sp3::base": { bestIndex: 1, explanation: "Pausing all dependent work until the hardware is confirmed ready treats a known, specific, six-week risk as if it were an unknown one \u2014 it protects against the risk by giving up the schedule entirely, which is a worse trade than the risk itself. Proceeding without any change dismisses a specific, credible warning from the same person whose bracket-stress flag on the airframe side turned out to be exactly right \u2014 optimism is not a mitigation. Logging the dependency with a concrete trigger and a concrete technical workaround (building against simulated telemetry now, swapping to real data once it lands) is the only option that actually treats the risk as manageable rather than as a reason to either freeze or ignore it, and it's the option that keeps the roadmap's sequencing decision \u2014 building the engine first \u2014 actually achievable on schedule." },
  "DP_Sp4::base": { bestIndex: 1, explanation: "Prioritizing by Priya's technical interest repeats the exact failure mode her original wishlist already demonstrated \u2014 confident, unvalidated judgment standing in for a real prioritization method. Letting Tom reorder the backlog weekly based on the newest customer request solves for responsiveness at the cost of stability; a backlog that never holds still for more than a week gives the team no room to actually build momentum on anything, which is a direct hit to flow, not a customer-focused improvement. A value-versus-risk method checked against both the vision statement and what Hollis has actually said grounds prioritization in the two sources of truth the squad has spent the whole phase establishing, rather than in whoever argues most recently or most loudly." },
  "DP_Sp5::base": { bestIndex: 1, explanation: "Leaving technical items written as tasks might be fine for Rosa today, but it leaves the backlog without a shared way to judge relative value \u2014 a task has no natural place in a value-ordered list the way a user-centered story does, which is exactly the gap DP_Sp4's prioritization work is trying to close. Splitting the backlog into two separate lists solves the immediate friction but fragments the one thing a product backlog is supposed to be: a single, ordered source of truth. Rewriting every item \u2014 including technical and infrastructure work \u2014 into a user-story form forces a discipline that pays off later: it's much harder to justify prioritizing an item nobody can name a beneficiary for, which is precisely the clarity Rosa's complaint was pointing at." },
  "DP_Sp6::base": { bestIndex: 1, explanation: "Committing to Marcus's date as stated feels responsive in the moment, but it commits the team to a number that wasn't checked against its own capacity or against Felix's known hardware dependency \u2014 it trades a harder conversation now for a much harder one in nine weeks. Quietly planning around a more realistic date while telling Marcus what he wants to hear avoids the same hard conversation without avoiding the underlying problem; Marcus will still show up expecting the date he was told, just with less warning when it slips. Walking Marcus through the actual capacity math \u2014 including a concrete partial-scope fallback \u2014 gives him something a sponsor genuinely needs more than a comforting date: a real basis for what he tells Hollis, and a defined fallback if reality doesn't cooperate." },
  "DP_Sp7::base": { bestIndex: 1, explanation: "A heavy, checklist-style Definition of Ready modeled on the facility project imports governance built for a fixed-scope, many-stakeholder construction effort onto a two-person software squad \u2014 the same mismatch Renata's funding conversation back in Envision was about, just recurring in a different artifact. Skipping a formal Definition of Ready and leaving it to Rosa's individual judgment reintroduces the exact inconsistency her own complaint (\"how do we know it's ready to start?\") was flagging \u2014 a standard nobody wrote down is not a standard, it's a mood. A lightweight, right-sized Definition of Ready \u2014 clear acceptance criteria, a rough estimate, no blocking dependency \u2014 gives Rosa the actual, specific answer she asked for, proportional to a team of two rather than a team of two hundred." },
  "DP_Sp8::base": { bestIndex: 1, explanation: "Defining Done as merged-and-tested while deferring compliance evidence \"once the architecture settles\" repeats, almost exactly, the wrong answer from the earlier conversation about sprints versus the paper trail \u2014 Dr. Osei's actual, stated concern was that evidence deferred to later tends never to get reconstructed with the fidelity an audit needs. Leaving Done flexible and deciding case by case during sprint review produces the same inconsistency problem the Definition of Ready was just built to prevent, applied to the more consequential half of the pair. Defining Done to include verification and traceability evidence specifically for autonomy-relevant code \u2014 proportional to what Dr. Osei described, not a full waterfall compliance package \u2014 is the one option that treats regulatory evidence as a routine part of finishing work rather than a separate effort someone has to remember to do later." },
  "DP_It1_1::base": { bestIndex: 1, explanation: "Committing to an ambitious stretch amount to impress Marcus and Hollis treats the very first sprint \u2014 the one time this team has the least evidence about its own capacity \u2014 as the moment to make the boldest promise, which is backwards; overcommitment here doesn't just risk missing a goal, it corrupts the one thing a first sprint is actually for: establishing an honest baseline. Letting Priya decide the commitment unilaterally repeats a pattern that's already cost the team once \u2014 in Envision, her unchecked instincts produced an unprioritized six-item wishlist \u2014 and it excludes Rosa, the person who actually has to do the work, from a decision that's fundamentally about capacity. A conservative, well-understood commitment produces something more valuable than a good first impression: real data about what this specific team can actually finish, which every future sprint plan will depend on." },
  "DP_It1_2::base": { bestIndex: 1, explanation: "Breaking every item into exhaustive, hour-level tasks before any work starts spends real planning time estimating details that will change the moment Rosa actually opens the code \u2014 it's the same over-planning instinct Priya's wishlist and a heavyweight Definition of Ready both already represented, just relocated to task granularity. Skipping breakdown entirely removes the one thing that gives daily work visibility \u2014 without it, nobody can see at a glance what's actually moving versus stuck, which is precisely the function a task board serves. A lightweight breakdown, refined as the work reveals what's actually needed, gives the team enough structure to track daily progress without pretending to know today what will only become clear once the work is underway." },
  "DP_It1_3::base": { bestIndex: 1, explanation: "Having Rosa commit to one approach and build it out fully skips the one step that would tell her, cheaply, whether that approach actually survives contact with noisy data \u2014 if it doesn't, the team discovers that after spending real engineering time on it instead of before. Escalating the technical decision to Priya hands a specific implementation question to someone whose expertise is product vision, not sensor-fusion algorithms \u2014 the same category of mistake as letting the wrong domain expert make a technical call. A short, time-boxed spike testing multiple candidate approaches against the real noisy data is exactly what a spike exists for: resolving a genuine technical unknown with a small, bounded investment before committing to build on top of it." },
  "DP_It1_4::base": { bestIndex: 1, explanation: "Letting Rosa keep working around the blocker alone treats an impediment as her problem to solve quietly, when removing impediments so the team can focus on delivery is specifically the project lead's role \u2014 half a day is already gone, and waiting for it to surface naturally at standup just adds more. Deferring it to the retrospective turns a same-day fixable blocker into a multi-day one, since the retrospective won't even happen until the sprint ends. Logging it immediately and personally chasing down whoever owns the missing feed treats the impediment the way impediments are supposed to be treated: as something the team actively removes, visibly and immediately, rather than something an individual is left to absorb." },
  "DP_It1_5::base": { bestIndex: 1, explanation: "Trusting Rosa's own manual impression that the work is done skips the actual point of writing acceptance criteria back in Speculate \u2014 a developer's confidence in their own work is not the same thing as verification against a written, agreed standard, and the whole reason acceptance criteria exist is to make that distinction checkable rather than a matter of trust. Skipping formal testing this iteration to save time treats verification as an optional step that can be caught later, which is exactly the deferred-evidence trap the team already learned from Dr. Osei to avoid in a different form. Systematically checking the work against each written acceptance criterion, with Priya confirming the result, closes the loop the team built specifically for this moment \u2014 it costs a little time now, in exchange for actually knowing whether 'done' is true." },
  "DP_It1_6::base": { bestIndex: 0, explanation: "A velocity chart measures throughput trend across multiple sprints, and this team has exactly one sprint of history \u2014 a velocity chart built on a single data point doesn't show a trend, it shows one number dressed up as if it means something it doesn't yet, which risks giving Renata false confidence in either direction. A cumulative flow diagram is built for visualizing work-in-progress across continuous flow, which is a better fit once the team has an ongoing kanban-style board with meaningful WIP to track across states \u2014 it's not wrong as a future tool, but it's not the most direct answer to Renata's specific question about this single, timeboxed sprint. A burndown chart, tracking the sprint's committed remaining work against the days left in its own timebox, is the tool actually built for exactly this question, using exactly the data this team already has." },
  "DP_It1_7::base": { bestIndex: 1, explanation: "Keeping it brief and moving straight to the next sprint treats 'good sprint' as a satisfying enough answer on its own, which wastes the one moment specifically designed to turn what just happened into something the next sprint does differently \u2014 the retrospective, not the sprint itself, is where continuous improvement actually happens. Letting the conversation center on who should have caught the telemetry-feed problem sooner turns a process question into a blame conversation, which is the fastest way to make a two-person team stop bringing up problems honestly in the future. An honest, structured conversation that lands on exactly one concrete change keeps the retrospective focused on the system rather than the person, and one specific commitment is far more likely to actually happen than a long list of vague good intentions." },
  "ITER1_DEMO::thriving": { bestIndex: 1, explanation: "Telling Marcus and Hollis that one successful demo proves the entire autonomous system will work by launch is the classic trap of a strong early result: a single validated slice, run against simulated data under favorable conditions, says nothing yet about how the system holds up across the full range of real-world edge cases still ahead. Downplaying a genuine, hard-won success costs the team real trust and morale for no protective benefit \u2014 Hollis's reaction was earned, and pretending otherwise doesn't make the project safer, it just wastes a legitimate moment of confidence. Presenting the result honestly \u2014 real validated progress, specific about what's still unproven at full scale \u2014 gives Marcus and Hollis something more durable than excitement: an accurate basis for what they tell the board in nine weeks." },
  "ITER1_DEMO::strained": { bestIndex: 1, explanation: "Showing Hollis only the clean run and hiding the near-miss trades a harder conversation now for a much worse one later, whenever she discovers the limitation herself \u2014 and 'the vendor hid a known issue from us' is a far more damaging story than 'the vendor told us about a known issue and their plan to fix it.' Canceling the demo entirely to avoid showing imperfect work violates the basic agile principle the whole adaptive approach is built on: delivering value frequently and making real work visible, edge cases included, is what lets Hollis trust the process rather than just the polish. Showing the honest result \u2014 real progress and a specific, credible plan for the known edge case \u2014 is the only option that builds the kind of trust that survives the next inevitable rough sprint." },
  "ITER2_CRISIS::thriving": { bestIndex: 1, explanation: "Patching the specific failure case quietly, even from a position of real strength and credibility, normalizes exactly the behavior Dr. Osei has been warning against since Envision \u2014 evidence handled informally instead of surfaced, regardless of how good the team's standing happens to be at the moment. Halting all other Iteration 2 work for a full audit overcorrects against a defect that's specific and reproducible, not evidence of a systemic pattern across the whole codebase \u2014 it spends the team's hard-won momentum on an unproven wider risk instead of the actual one in front of them. Pausing the affected work, documenting the defect fully, and giving Dr. Osei and Marcus a specific, honest assessment is exactly what the Definition of Done's verification standard exists for: this is the moment it was built to handle, and the team's credibility gives them the standing to deliver bad news well rather than an excuse to avoid delivering it at all." },
  "ITER2_CRISIS::strained": { bestIndex: 1, explanation: "Patching quietly and hoping nobody re-examines the earlier demo compounds one already-fragile position with a second, larger one \u2014 a near-miss that was disclosed honestly is recoverable; a defect that was actively concealed is a different kind of problem entirely if it ever comes out. Asking Marcus to extend the deadline without fully explaining why is a half-measure that buys time without actually resolving the trust or safety question \u2014 Marcus is being asked to accommodate a problem he doesn't know the real shape of. Documenting the defect fully and escalating honestly, badly timed as it is, is the only option that treats the team's already-diminished credibility as something to rebuild through transparency rather than risk further with a second concealment on top of the first." },
  "ITER2_CRISIS::failing": { bestIndex: 1, explanation: "Patching quietly and saying nothing, from a position this fragile, isn't a corner being cut \u2014 it's a known safety-relevant defect in autonomous flight-control logic being deliberately hidden from the one person whose entire job is catching exactly this, which is no longer a project-management misstep but a genuine integrity failure with consequences well beyond this sprint. Pushing the decision to Renata isn't unreasonable on its face, but it deflects a call that the person actually holding the information is the one positioned to make fastest, and delay here has real safety implications the other options don't share. The unconventional option \u2014 proactively telling Hollis and pulling the feature from the board demo \u2014 is a genuine, honest, and costly alternative that resets expectations before anyone else forces the issue; it's a defensible path, but it gives up the board-demo asset before anyone has actually confirmed the fix can't be delivered in time. Calling an immediate stop and personally delivering the finding to Marcus and Dr. Osei together, in the same room, is the option that treats the defect with the seriousness it actually warrants while preserving every option \u2014 fix, disclose, replan \u2014 that a unilateral pull or a delegated decision would have already foreclosed." },
  "DP_It2_1::base": { bestIndex: 1, explanation: "Keeping the full original scope and adding the fix on top of it repeats Iteration 1's overcommitment mistake in a more dangerous form \u2014 this time the added work isn't optional stretch, it's a mandatory safety fix, and pretending the sprint has room for both anyway all but guarantees something gets rushed. De-prioritizing the fix itself because it's \"already logged\" is precisely the deferred-evidence trap the team has now failed at twice in different forms \u2014 a logged defect that isn't actually fixed is not a resolved one. Formally re-planning the sprint and communicating the change honestly treats the discovery as what it actually is: new information serious enough to change the plan, which is the entire premise an adaptive lifecycle is built to accommodate." },
  "DP_It2_2::base": { bestIndex: 1, explanation: "Encouraging Rosa to push through extra hours treats a two-person team's only developer as elastic capacity rather than a finite one, and normalizing unsustainable pace during a crisis sprint makes it far more likely to become the expectation during the next one too. Saying nothing and leaving the decision entirely to Rosa abdicates a responsibility that became active the moment ${n} actually noticed the pattern \u2014 people under this kind of pressure often don't self-advocate precisely when they most need someone else to. Cutting scope or extending the timeline instead of compressing the person is the direct application of the working agreements the team wrote together back in Envision, and it treats sustainable pace as a real constraint on planning rather than a value that only holds when it's convenient." },
  "DP_It2_3::base": { bestIndex: 1, explanation: "Switching entirely to velocity and retiring the burndown loses the one chart that actually answers a different, still-relevant question \u2014 how this specific sprint's remaining work is tracking against its own timebox \u2014 in favor of a chart that only answers a longer-horizon question. Refusing to track velocity at all because it caused confusion with a single data point punishes the tool for being used at the wrong time before, rather than recognizing that the team now has exactly the two-point history that makes it meaningful. Keeping the burndown for within-sprint visibility while adding a velocity trend now that there's real history to plot uses each chart for the specific question it's actually built to answer, rather than treating them as interchangeable or as a single either-or choice." },
  "DP_It2_4::base": { bestIndex: 1, explanation: "Leaving Dr. Osei's involvement as informally as before ignores what the last two weeks just demonstrated \u2014 that the gap between what the team believes is verified and what's actually verified can be wide enough to almost ship a real safety defect. Adding her as a standing retrospective member blurs a boundary worth keeping: the retrospective is specifically a team-internal space for candid, sometimes uncomfortable process reflection, and a compliance stakeholder's ongoing presence there risks changing what the team is willing to say honestly in the room. Inviting her to sprint reviews \u2014 where verification evidence and working increments are already being shown to stakeholders as a matter of course \u2014 gives her direct visibility into exactly the evidence she needs, through the ceremony that already exists for exactly that purpose, without compromising the retrospective's different function." },
  "DP_It3_1::base": { bestIndex: 1, explanation: "Pulling in the extra item on the strength of \"earned benefit of the doubt\" ignores the actual data now available \u2014 two real sprints of velocity \u2014 in favor of a feeling, which is precisely the reasoning DP_It1_1 already showed doesn't hold up once real information exists. Deferring the call to Marcus and Tom hands a capacity question to the two people least positioned to answer it accurately \u2014 sales and sponsorship don't have the velocity data in front of them, the team does. Freezing scope to what real capacity supports treats the hard-won velocity trend as something to actually act on rather than override on optimism, protecting the quality of the release that matters most: the one going in front of the board." },
  "DP_It3_2::base": { bestIndex: 1, explanation: "Adding Hollis's request on top of an already-planned sprint without adjusting anything else repeats the exact overcommitment pattern the team learned to avoid back in Iteration 1, at the worst possible moment to relearn it. Flatly telling Hollis the sprint is locked with no further discussion treats a backlog as more rigid than an adaptive approach is supposed to be \u2014 the entire premise of iterative delivery is that real customer input can still change the plan, through negotiation rather than either blind acceptance or blind refusal. Evaluating the request against the vision and real capacity, then negotiating an honest trade-off, is exactly how a backlog-driven change process is supposed to work: the customer's input is taken seriously, and the cost of saying yes is made visible and explicit rather than absorbed silently." },
  "DP_It3_3::base": { bestIndex: 1, explanation: "Skipping the retrospective entirely trades away the last chance to explicitly capture the arc of the whole Iterate phase \u2014 the exact same dismissive instinct DP_It1_7's wrong answer represented, now arriving with more at stake, not less. Introducing a brand-new process change two days before the highest-stakes moment the project has had is poor timing regardless of how good the change might be in the abstract \u2014 new process changes need room to actually be absorbed, which a 48-hour runway to a board meeting doesn't provide. Using the retrospective to consolidate and confirm what's already working, while deliberately holding new changes until after the board meeting, respects both halves of the situation: real reflection still happens, and the team's stability isn't put at risk right when stability matters most." },
  "ITER3_DRY_RUN::thriving": { bestIndex: 1, explanation: "Stopping rehearsal because this run went well mistakes one successful dry run for readiness against whatever specific, unpredictable questions an actual board might ask \u2014 confidence built over three sprints is real, but it isn't the same thing as having stress-tested the presentation itself. Handing the technical portions entirely to Marcus and Tom removes the one person in the room who can speak to the work with full, direct credibility, right when that credibility matters most \u2014 presenting isn't required to be solo, but disappearing from it entirely is a different thing. Running one more rehearsal aimed specifically at the board's toughest likely questions, even after a strong result, is the discipline that got this team through a hidden safety defect two sprints ago \u2014 there's no principled reason to abandon it now that the finish line is close." },
  "ITER3_DRY_RUN::strained": { bestIndex: 1, explanation: "Showing the rough panel and hoping nobody notices gambles the board meeting's credibility on a specific, visible flaw that a sharp-eyed board member has a real chance of catching, with no plan in place if they do. Quietly removing the panel without telling Marcus why keeps him uninformed about a decision that's genuinely his to weigh in on \u2014 he's the one standing in front of the board, and being surprised by a missing feature is its own kind of risk. Telling Marcus about the rough panel before the meeting and deciding together how to handle it \u2014 polish, simplify, or cut \u2014 is the same principle DP_Sp6 already established with his release-date pressure: an honest, specific picture given early is worth more to a sponsor than a smooth surface that might not hold up under a single follow-up question." },
  "REV_BOARD_MEETING::thriving": { bestIndex: 1, explanation: "Having Marcus field a technical safety-strategy question keeps the room's mood consistent but puts the answer in the mouth of someone without the standing to actually speak to it \u2014 the same category of mistake as letting the wrong domain expert make a technical call, just happening live in front of the customer this time. Offering to follow up in writing dodges a question the board asked directly, in the room, of the person actually positioned to answer it \u2014 deferring a fair question reads as evasive even when the intention is just to be thorough. Letting Dr. Osei answer directly, including an honest acknowledgment of what's still evolving, is exactly what three sprints of building a real evidence trail was for: having the actual expert give the actual answer, rather than protecting the mood at the cost of a credible response." },
  "REV_BOARD_MEETING::strained": { bestIndex: 1, explanation: "Insisting everything is completely under control, when the board member is looking directly at visible evidence otherwise, damages credibility more than the imperfection itself does \u2014 the panel is a minor issue; denying what's plainly on the screen is not. Letting Tom smooth it over with general reassurance skips the specific question that was actually asked, which tends to make a skeptical board member more skeptical, not less. Acknowledging the specific panel honestly, explaining why it was added late and what finishing it looks like, while pointing to the team's actual verification track record, treats a fair question as an opportunity to demonstrate the same transparency that got this team through Iteration 2's crisis \u2014 which is a stronger answer than pretending nothing is unfinished." },
  "REV_BOARD_MEETING::failing": { bestIndex: 1, explanation: "Calling a live, visible failure a network glitch, in front of the exact audience this release exists to earn the trust of, is a lie told at the worst possible moment to tell one \u2014 boards that discover they were misled in the room they were sitting in rarely give a second chance, which is exactly the kind of consequence this specific dishonesty deserves. Letting Marcus handle the room while staying silent removes the person with the most direct, credible understanding of what actually happened from the one moment that most needs it. The unconventional choice \u2014 proactively recommending the board pause the autonomous-flight feature specifically \u2014 is a genuinely honest and serious response, but it forecloses options (further investigation, a possible fix, honest disclosure without full feature withdrawal) before anyone has actually determined whether pausing the whole feature is proportionate to what's actually wrong. Stopping the demo, acknowledging the failure honestly, and committing to a specific investigation and timeline treats a genuine, visible failure exactly the way three sprints of the team's own hard-won practice already established it should be treated \u2014 and it's the only option that keeps every real path (fix, adjust, or yes, eventually pause) still open." },
  "DP_Rev1::base": { bestIndex: 1, explanation: "Letting the board's in-room reaction alone decide the funding outcome throws away the entire premise of the funding plan built back in Envision specifically to make this decision evidence-based rather than a mood read from a single meeting. Letting Marcus decide unilaterally, bypassing the plan's own criteria, repeats a pattern the team has specifically learned to avoid \u2014 a single person's gut call standing in for an agreed process, even when that person has good judgment. Formally evaluating the release against the funding plan's actual written continue-stop-pivot criteria is the entire reason that document was written months ago: to make sure this exact decision, arriving now under real emotional pressure in either direction, gets made on evidence rather than on how the room happened to feel afterward." },
  "DP_Rev2::base": { bestIndex: 1, explanation: "Committing to an ambitious new roadmap in the immediate afterglow of a successful board meeting repeats Priya's original wishlist pattern from Envision \u2014 genuine enthusiasm standing in for a validated plan \u2014 just with higher stakes now that there's a real board and a real funding relationship attached. Shutting the conversation down entirely discourages exactly the kind of product ownership and forward thinking that's been valuable throughout, and does so right when Priya's instincts have mostly been vindicated by three sprints of real delivery. Acknowledging the momentum while treating what comes next as its own deliberate visioning exercise \u2014 rather than a decision made in the excitement of today \u2014 respects both the energy and the discipline that got the team here in the first place." },
  "DP_Trans1::base": { bestIndex: 1, explanation: "Keeping the handoff minimal and relying on Rosa's continued availability creates exactly the kind of single-person dependency that works fine until the one day it doesn't \u2014 a bus-factor risk the team never had to face during active development but absolutely will during operations. Writing an exhaustive manual covering every conceivable scenario spends real time up front on problems that mostly haven't happened yet, the same over-planning instinct the team already learned to resist with task breakdowns and Definitions of Ready. A real handoff package \u2014 a runbook, key documentation, and an actual knowledge-transfer session \u2014 gets the operational knowledge out of one person's head without pretending to predict every future problem, which is the proportionate answer for a small team handing off a real but not enormous system." },
  "DP_Trans2::base": { bestIndex: 1, explanation: "Accepting the release as final and complete misrepresents what an adaptive product actually is \u2014 there is no version of this system that's ever truly \"done\" the way a delivered building is, and pretending otherwise sets up a false expectation the first time something reasonably needs to change. Delaying acceptance until every known rough edge is polished holds the relationship in indefinite limbo over items everyone already knows about and has already planned for, which contradicts the entire principle of delivering value frequently rather than withholding it until an unreachable standard of perfection. Accepting this as a genuine first release, with a specific and agreed plan for what's already known to be outstanding, is honest about what adaptive delivery actually is and gives Hollis something more useful than a false sense of finality: a real, trackable commitment." },
  "DP_Close1::base": { bestIndex: 1, explanation: "Skipping lessons learned because everyone's ready to move on discards the one artifact specifically designed to make the next attempt easier than this one was \u2014 trusting people to just remember tends to work poorly once time, other projects, and turnover intervene. Keeping it purely informal has the same problem in a softer form: an unwritten lesson is a lesson that exists only as long as the specific people who lived it stay around to retell it. Formally documenting what should carry forward treats organizational learning as something the company gets to keep, not just something the two people who lived through it happen to remember for a while." },
  "CLOSE_FINAL::thriving": { bestIndex: 0, explanation: "Keeping the session brief to let the team enjoy the moment is a reasonable human instinct, but a project this successful is still rare enough, and specific enough in why it worked, that letting the details go undocumented wastes exactly the kind of hard-won institutional knowledge the Lessons Learned Register exists to capture. Personally thanking Rosa and Priya individually is a genuinely kind gesture, but on its own it doesn't leave anything behind for whoever attempts this next. Documenting the lessons in real detail, precisely because this one actually worked, is what turns one team's good outcome into something Soren can deliberately try to repeat rather than something it got lucky with once." },
  "CLOSE_FINAL::strained": { bestIndex: 0, explanation: "Focusing only on the wins to protect morale after a hard stretch is a caring impulse, but it also quietly erases the specific, real cost the team paid to get here \u2014 cost that deserves to be named if it's ever going to be planned around better next time. Holding a separate, private conversation with Renata and Marcus about the harder parts keeps the team itself from ever hearing an honest account of its own project, which is a strange thing to withhold from the people who actually lived it. Being candid with Rosa and Priya about everything that went sideways, and why, treats them as the adults who did the actual work and earned an honest account of it \u2014 which is consistent with the transparency that got this team through its worst moment back in Iteration 2." },
  "CLOSE_FINAL::failing": { bestIndex: 0, explanation: "Framing the account around external pressure and circumstances beyond anyone's control is a familiar and understandable instinct after a hard outcome, but it's also the exact pattern this project's better moments were specifically built by rejecting \u2014 owning the specific, correctable decisions along the way is what makes a hard lesson usable rather than just a story about bad luck. Asking for a private conversation with Marcus before facing Rosa and Priya keeps the people most affected by the outcome from hearing an honest account directly, and delays a reckoning that arrives eventually one way or another. Taking real ownership of what went wrong across the three iterations, in the final account, is the harder conversation to have, but it's the only version of this ending that leaves something worth learning from behind it." },
  "DP_It1_Standup::base": { bestIndex: 1, explanation: "Skipping a dedicated daily check-in entirely repeats the exact gap that just cost half a day \u2014 a blocker sat quietly on Rosa's end specifically because nothing prompted either of them to surface it sooner, and 'ask whenever something comes up' already had its chance to work today and didn't. Making the check-in a longer, more thorough status meeting overcorrects in the other direction, recreating the exact kind of ceremony-for-its-own-sake Rosa already pushed back on when she cut the original five-meeting structure down. A short, fixed check-in focused specifically on progress and blockers is the actual purpose of a daily standup: a coordination tool the team uses for itself, not a status report performed for someone else's benefit \u2014 and today gave them the concrete evidence for why it matters, rather than an abstract argument for process." },
  "DP_It2_Refinement::base": { bestIndex: 1, explanation: "Leaving upcoming items alone until Iteration 3's planning day guarantees the same stall Rosa herself warned about back in Speculate \u2014 a backlog that's never looked at ahead of time isn't ready just because planning day has arrived. Having Priya refine the upcoming items alone, without Rosa's input, repeats a mistake the team already paid for once, in Iteration 1, when a technical call got made without the person who'd actually have to build it \u2014 sizing and clarifying backlog items needs the same technical voice, for the same reason. A short, regular refinement slot is what keeps a backlog genuinely ready without turning it into a heavyweight ceremony of its own \u2014 real teams generally aim to spend no more than about an hour a week on this, and needing meaningfully more than that is usually a sign the team is over-preparing rather than under-preparing \u2014 which is the same right-sized instinct that shaped the Definition of Ready in the first place." },
  "DP_It1_Sizing::base": { bestIndex: 1, explanation: "Having Priya size the items alone repeats the same mistake pattern the team has already paid for once, in the spike decision, and will pay for again later if it's allowed to recur \u2014 estimating technical complexity is a call that belongs with the person who'll actually do the work, not the person who owns the product vision. Skipping numeric sizing entirely and just committing to a rough count of items feels faster today, but it quietly removes the one thing the team will need in just a few sprints: an actual numeric baseline for velocity to measure against, since there's no trend to plot from a history of un-sized commitments. Running planning poker properly means facilitating rather than voting \u2014 walking Rosa through each item, letting her reveal a considered number rather than a reactive guess, and pausing to talk through anything that looks bigger or smaller than expected \u2014 which puts the estimate in the hands of the person who'll actually do the work while still catching hidden complexity or mismatched assumptions before they cost a real sprint's worth of time instead of five extra minutes of conversation." },
  "DP_It2_Sizing::base": { bestIndex: 1, explanation: "Running full planning poker on every upcoming item spends real, scarce team time manufacturing false precision on work that's still likely to change shape before it's ever pulled into a sprint \u2014 the same progressive-elaboration principle that already argued against exhaustive hour-level task breakdowns back in Iteration 1 applies just as directly to estimating distant backlog items with near-term precision. Having Rosa assign poker-style numeric points on her own, with nobody facilitating a walkthrough or prompting a second look at anything surprising, keeps the technique's output format without its actual value \u2014 a number produced alone, without the discussion a facilitator would normally prompt, is really just a guess dressed up to look more precise than it is. T-shirt sizing, run together with Rosa rather than solo, gives the batch a fast, honest, rough relative order using a technique actually built for lower-certainty, longer-horizon estimating, while deliberately saving real numeric precision \u2014 and real facilitated discussion \u2014 for whichever items survive long enough to actually be pulled into a sprint." },
  "DP_It1_Skeleton::base": { bestIndex: 1, explanation: "Building the obstacle-avoidance logic completely first treats integration risk as something to deal with later, which risks discovering \u2014 only after real engineering time is already spent \u2014 that the dashboard can't actually consume what the engine produces, or that the simulated sensor feed doesn't connect the way anyone assumed. Letting Rosa build whichever piece feels natural and integrate later repeats the same risk in a less deliberate form, since nothing proves the pieces actually connect until both happen to be far enough along to test together \u2014 the classic 'big bang integration' pattern that surfaces problems at the most expensive possible moment. Proving the architecture end to end first \u2014 the thinnest possible version of every layer, wired together before any single layer is built out \u2014 is a distinct and complementary technique to the spike Rosa runs a few days later: where a spike investigates one specific unknown in isolation, a thin end-to-end build proves the overall architecture actually connects, cheaply, before real effort goes into making any one piece good." },
  "DP_Sp2_1::base": { bestIndex: 1, explanation: "Committing to the full twelve-corridor build on momentum alone repeats the exact overcommitment pattern from the very first sprint, just rescaled to a problem an order of magnitude bigger \u2014 a strong track record is not the same thing as validated scope. Letting engineering start prototyping immediately assumes the fleet-coordination problem is a straightforward extension of the existing engine, when Rosa's own reaction moments later shows it genuinely isn't \u2014 assuming technical continuity without checking it is a fresh version of the same risk the team already learned to spike rather than assume. Running the same structured visioning exercise that worked in Envision, now scoped to what a real fleet actually requires and specific with Hollis about which corridors matter first, reapplies a proven discipline to new stakes rather than assuming past success excuses skipping it this time." },
  "DP_Sp2_2::base": { bestIndex: 1, explanation: "Pushing forward with just Rosa treats the sustainable-pace lesson from Release 1 as if it only applied to one specific crisis sprint rather than as a standing constraint \u2014 a twelve-corridor fleet is a permanently larger workload, not a temporary spike a hard-working developer can absorb. Bringing in a second developer immediately without onboarding skips the same working-agreements discipline that mattered enough to write down carefully the first time a team formed \u2014 a new person thrown straight into code without it isn't actually joining the team's culture, just occupying a desk in it. A deliberate hire with a real plan to fold them into the existing working agreements treats team formation as something worth doing right a second time, not just something that already happened once and therefore doesn't need attention again." },
  "DP_Sp2_3::base": { bestIndex: 1, explanation: "Pulling every originally deferred item back in at once mistakes the team's proven track record for unlimited capacity \u2014 credibility earned by delivering one disciplined release doesn't mean every previously cut idea is now automatically worth building. Letting AeroVolt's ops team choose freely without a framework repeats a mistake the team specifically corrected once already, when Tom's unchecked weekly requests were rejected as a backlog-prioritization method for exactly this reason. Re-evaluating each deferred item against the same value-versus-risk discipline used the first time, now in the actual context of a fleet rather than a single drone, treats the original deferral as a decision worth revisiting on the merits rather than either ignoring permanently or reversing wholesale." },
  "DP_Sp2_4::base": { bestIndex: 1, explanation: "Keeping the exact same lightweight evidence practice unchanged assumes that because tailoring was done correctly once, it never needs to be reconsidered \u2014 but tailoring is a response to a specific risk profile, and Dr. Osei is explicitly saying that profile just changed by an order of magnitude. Adopting a fully formal, heavyweight process well beyond what Dr. Osei is actually asking for repeats the facility-project-rigor overcorrection the team already learned to avoid back in Speculate's first pass at this same question. Revisiting the tailoring decision specifically because the risk has changed \u2014 not on a fixed schedule, not out of habit, but because the actual conditions are different now \u2014 is what tailoring is supposed to mean: a decision that gets reassessed as context evolves, not a one-time setting locked in at the start of a project." },
  "DP_Sp2_5::base": { bestIndex: 1, explanation: "Committing to Marcus's date without re-checking capacity assumes that delivering once under pressure validates committing to a new, different pressure without doing the math again \u2014 the team's composition and the problem's shape have both changed since the last time this exact question was answered correctly. Letting the new developer's own optimistic estimate stand unchallenged skips the same verification discipline the team applied to its own work throughout Release 1 \u2014 an unverified estimate doesn't become trustworthy just because it comes from the person who'll do the work, especially someone still new to the codebase. Walking through the real capacity math again, explicitly including ramp-up time and fleet-coordination complexity, is the same capacity-grounded discipline that already worked once, applied honestly to a genuinely different set of facts rather than assumed to still hold." },
  "DP_It4_1::base": { bestIndex: 1, explanation: "Having Jonah only shadow Rosa this sprint protects against early mistakes but also guarantees he contributes nothing real for two full weeks, which is a slow and costly way to onboard someone the team specifically decided it needed. Assigning him independent work immediately ignores that he has zero context on a codebase two other people built without him \u2014 independence without context is a quality and morale risk, not genuine capacity. Pairing him directly with Rosa on real work from day one gives him actual context through actual work, which is both faster and more honest than either protecting him from the codebase or exposing him to it with no support." },
  "DP_It4_2::base": { bestIndex: 1, explanation: "Splitting the codebase into fixed ownership boundaries solves the immediate coordination question but recreates, deliberately this time, the exact knowledge-silo risk the team is about to discover the hard way with Rosa's original routing logic. Letting Jonah pick tasks purely by personal interest feels motivating but ignores whether those tasks are actually the ones the sprint most needs done \u2014 enthusiasm isn't the same as prioritization. Keeping ownership shared and flexible, worked through the board together, avoids hardening silos on day one while still giving the sprint a real, coordinated plan." },
  "DP_It4_3::base": { bestIndex: 1, explanation: "Letting Rosa keep handling the undocumented logic herself is the fastest option this sprint and the worst one for every sprint after it \u2014 it treats a real bus-factor risk as acceptable simply because addressing it costs time right now. Having Jonah document the code independently, without Rosa's direct involvement, captures what the code does but misses why it does it that way, which is usually the part that actually matters when something later needs to change. Deliberately pairing Jonah with Rosa on exactly the undocumented parts is slower this sprint and is the only option that actually closes the gap, rather than working around it or papering over it with documentation that misses the reasoning behind the code." },
  "DP_It4_4::base": { bestIndex: 1, explanation: "Splitting the investigation between Rosa and Jonah working independently divides effort on a problem neither of them, and not the team as a whole, has ever actually solved before \u2014 parallel investigation works well when there's enough shared context to compare notes meaningfully afterward, which isn't true here yet. Having Rosa investigate alone while Jonah works on unrelated items excludes him from exactly the kind of genuinely new problem that would build real shared understanding fastest, re-creating the same exclusion pattern the team just corrected with the routing-logic pairing. A single joint spike, both developers working through the same candidate approaches together, builds shared understanding of a brand-new problem faster than either splitting the work or leaving one person out of it." },
  "DP_It4_5::base": { bestIndex: 1, explanation: "Comparing this sprint's velocity directly against Release 1's baseline treats two fundamentally different team compositions as if they produce a directly comparable number \u2014 one developer's established pace and two developers' first sprint together are not measuring the same thing. Averaging the two into a single blended figure doesn't resolve that problem, it just hides it inside a number that looks precise while actually conflating two different measurements. Treating this sprint as the start of a genuinely new baseline, without assuming continuity from Release 1's numbers, is the only option that respects what velocity is actually supposed to measure: this specific team's actual, current pace." },
  "DP_It4_6::base": { bestIndex: 1, explanation: "Running the retro the way it's always been run treats Jonah's silence as a lack of anything to contribute, when it's far more likely a lack of confidence that his input belongs yet \u2014 those are different problems with different fixes, and only one of them is solved by simply proceeding as before. Having Jonah observe without being asked to contribute is a gentler version of the same mistake: it protects him from being put on the spot at the cost of losing the one perspective on the team that can actually see what three sprints of familiarity have made invisible to everyone else. Explicitly asking what felt confusing as a newcomer treats his fresh eyes as a genuinely valuable and time-limited asset, which is exactly what a new team member's first few weeks actually are." },
  "DP_It5_1::base": { bestIndex: 1, explanation: "Jumping straight to a full twelve-drone simulation assumes the two-drone logic simply generalizes upward, which is exactly the assumption Jonah's discovery a few beats later shows was never safe to make \u2014 skipping the intermediate scales means finding out what breaks only at the most expensive, hardest-to-diagnose scale possible. Staying at two drones longer avoids the risk but also avoids ever discovering it, which doesn't make the fleet safer, it just delays finding out how unsafe it actually is. Scaling incrementally, four drones before twelve, is the only option that treats scale itself as a variable worth testing deliberately, rather than assuming correctness at one scale implies correctness at another." },
  "ITER5_CRISIS::thriving": { bestIndex: 1, explanation: "Patching the specific three-drone scenario without raising it further treats a scaling flaw discovered through the exact discipline Dr. Osei has been asking for since before this drone ever flew as if it were an ordinary bug \u2014 concealing evidence, even from a position of strength, is still concealing evidence. Halting all fleet testing for a full mathematical audit overcorrects against a specific, reproducible, now-understood flaw as if it were an unknown systemic one, spending the team's credibility on an unproven wider risk instead of the actual one just found. Pausing the affected work and notifying Dr. Osei before considering the fix verified is exactly what the verification culture this team already built was for \u2014 using it here, on a genuinely new kind of finding, is what makes it a real practice rather than something that only applied to the last crisis." },
  "ITER5_CRISIS::strained": { bestIndex: 1, explanation: "Patching quietly and hoping the configuration doesn't recur before the validation flight compounds an already-rushed testing week with a second, larger risk \u2014 a defect disclosed honestly, even discovered late, is recoverable in a way a defect that's actively hidden is not. Asking Marcus to push back the validation date without fully explaining why leaves him making a real decision without the actual information that decision depends on. Documenting the finding fully and escalating honestly, badly timed as it is, treats the team's credibility as something to protect through transparency rather than risk further by concealing a second problem on top of a rushed sprint." },
  "ITER5_CRISIS::failing": { bestIndex: 1, explanation: "Patching quietly overnight and proceeding with a real flight validation the next morning, without telling anyone, risks an actual physical near-collision between real aircraft in front of a regulatory observer \u2014 concealing a known collision-risk defect immediately before the exact flight it would affect is not a corner being cut, it is a decision that could put people and property at real risk. Pushing the decision to Renata is not unreasonable given her governance role, but it hands off a time-critical call to someone without the direct technical context, when hours matter. The unconventional choice \u2014 notifying the regulatory observer directly and independently \u2014 is a serious, honest, and defensible option that resets the relationship with total transparency, but it bypasses Marcus and Dr. Osei entirely before they've even had the chance to weigh in, foreclosing an internal decision that might have reached the same outcome without that bypass. Calling an immediate stop, canceling the flight, and personally delivering the finding to Marcus and Dr. Osei together tonight treats the defect with the urgency it actually requires while preserving every other option \u2014 informing the regulator, rescheduling, further testing \u2014 that acting alone or concealing it would have already closed off." },
  "DP_It5_2::base": { bestIndex: 1, explanation: "Fixing only the specific scenario that happened to be found treats a systemic gap \u2014 that nothing in the existing test suite was ever designed to catch problems specific to intermediate fleet sizes \u2014 as if it were fully resolved by patching the one instance that happened to surface. Skipping any change to the testing approach because this one issue was caught and fixed repeats the exact overconfidence-after-one-fix pattern the team already learned to avoid in Release 1, just with a different kind of defect. Fixing the specific scenario and establishing a standing practice of testing at several fleet sizes, not just the two extremes, is the only option that treats this near-miss as evidence about the test suite's actual coverage, not just about one unlucky configuration." },
  "DP_It5_3::base": { bestIndex: 1, explanation: "Continuing to treat Jonah as needing close pairing on anything significant, regardless of what he just demonstrated, undervalues a real, specific, and hard-won piece of evidence about his actual capability \u2014 trust that never updates in response to demonstrated competence isn't caution, it's just inertia. Giving him ownership of the entire codebase immediately overcorrects in the other direction, extending trust to areas he hasn't actually demonstrated command of based on strong performance in one specific area. Extending him real ownership over the deconfliction logic specifically \u2014 the exact part of the system he just proved he understands deeply \u2014 matches the scope of trust to the scope of what was actually demonstrated." },
  "DP_It5_4::base": { bestIndex: 1, explanation: "Leaving the near-miss as informal retrospective notes, since the specific bug is already fixed, loses the one piece of institutional memory that would help a future team \u2014 or this same team at a different scale \u2014 recognize the same category of gap before it recurs. Logging it narrowly as a single fixed bug captures that something happened without capturing the more valuable lesson: what kind of problem the existing tests were never built to catch. Formally logging the testing-gap lesson itself, not just the specific defect, is what actually makes a risk log worth maintaining \u2014 a record of the pattern, not just a checklist of resolved instances." },
  "REV2_FLIGHT::thriving": { bestIndex: 1, explanation: "Calling a real, observed GPS-degradation hold a routine sensor blip undersells an event the regulator watched happen with her own eyes \u2014 minimizing something she directly witnessed reads as evasive even when the underlying event was genuinely benign. Treating a fail-safe that performed exactly as designed as grounds for an emergency full-board review overcorrects in the opposite direction: it signals either that the team doesn't understand its own system's normal operating parameters or that it can't distinguish a working safety mechanism from an actual incident, and it spends organizational attention and credibility on a non-event \u2014 the kind of overreaction that makes a genuinely serious finding harder to get taken seriously later. Explaining specifically what happened and why it counts as the system working as intended, while noting it will appear in the standard post-flight report she already receives, matches the response to what actually occurred: honest, specific, and proportionate, neither hiding a real event nor manufacturing a crisis out of one that wasn't." },
  "REV2_FLIGHT::strained": { bestIndex: 1, explanation: "Minimizing a hold that ran more than twice as long as documented, to someone who's already flagged the discrepancy before the drone finished landing, treats her stated concern as something to manage rather than something to actually answer. Asking for time to review internally before responding is reasonable in the abstract, but she's asked a direct question in the moment and deferring it reads as stalling rather than diligence, especially right after telling her the report is still open. Acknowledging directly that the hold exceeded spec, with the actual flight data in hand, treats an uncomfortable discrepancy as something to explain honestly rather than manage carefully \u2014 which is the only version of this conversation likely to end with her report reflecting what actually happened rather than what she suspects was hidden from her." },
  "REV2_FLIGHT::failing": { bestIndex: 1, explanation: "Downplaying how close the drone actually came, to a regulator who watched it happen and is asking directly and explicitly for an honest answer, is a lie told to the one person in the entire program with the authority to grant or revoke its ability to fly \u2014 there is no version of this specific dishonesty, discovered later, that doesn't end the program entirely. Deferring the decision to Marcus fails to answer a direct safety question asked in a moment when a direct answer is exactly what's required; Marcus isn't standing on the tarmac, and the regulator needs a response from someone who is. The unconventional choice \u2014 handing over the raw data for independent verification \u2014 is a genuinely radical act of transparency and a defensible one, but it substitutes data for judgment at the exact moment a judgment is what's being asked for. Telling her honestly how close it came, and voluntarily proposing to ground the program pending investigation, is the only response that treats a real safety margin being tested for what it actually is, rather than something to spin, defer, or bury in raw telemetry instead of an answer." },
  "DP_Rev2_1::base": { bestIndex: 1, explanation: "Applying the exact same release readiness criteria used for a single test corridor to a twelve-corridor fleet with a real regulatory relationship now attached assumes nothing about the actual risk has changed since Release 1, which everything from Dr. Osei's warning back in Speculate (R2) through tonight's flight has already established isn't true. Skipping a formal evaluation entirely abandons the evidence-based governance model the team built specifically so a moment like this wouldn't come down to a gut read on how the flight felt. Formally revising the criteria to reflect what fleet scale actually requires \u2014 the new testing protocol, the real regulator relationship, the lessons from a near-miss that didn't become an incident \u2014 is the same tailoring principle the team already learned to apply to compliance evidence, now correctly applied to the readiness framework itself." },
  "DP_Variance_1::base": { bestIndex: 1, explanation: "Recapping Release 1 from memory relies on exactly the kind of selective, self-serving recollection that tends to remember the near-miss that was caught and quietly forget the assumption that turned out wrong \u2014 memory is not evidence, and this is specifically the moment evidence is available. Skipping the comparison because Release 1 already succeeded assumes success on one release automatically validates every assumption behind it, which is the same overconfidence-after-one-win pattern the team has already had to correct more than once, just applied to planning itself instead of to a specific defect. Pulling the actual Vision, Roadmap, and Release Plan and comparing them line by line against what really happened is the only option that treats the original plan as a testable baseline rather than either a trophy or an afterthought \u2014 which is the entire point of ever writing a baseline down in the first place." },
};

function pickChoice(choice, beatId, tier, choiceIndex) {
  const key = `${beatId}::${tier}::${choiceIndex}`;
  const delta = HIDDEN_DELTAS[key] || {};
  applyDelta(delta);
  history.push(beatId);
  decisionLog.push({ beatId, tier, choiceIndex });
  currentBeatId = choice.next;
  render();
  saveCloudProgress();
}

function advanceNarrative(beatId, nextId) {
  history.push(beatId);
  currentBeatId = nextId;
  render();

// Beat-count weights per phase (Envision 13 confirmed; Speculate/Iterate/
// Review/Transition/Close are provisional estimates pending build-out —
// see PHASE_BEAT_WEIGHTS below). Used as fixed weights so the overall
// progress bar's fill speed matches actual content density instead of
// treating every phase as equal-sized. A single flat "beats visited out of
// 202" number would also work, but weighting by phase means the bar still
// reads sensibly even though branching means no single playthrough visits
// every beat — progress within the CURRENT phase is what's actually known
// with certainty, and prior phases are counted as fully complete once left.
const PHASE_BEAT_WEIGHTS = {
  "Initiating": 13, "Planning": 25, "Executing": 72,
  "Monitoring & Controlling": 14, "Planning (Release 2)": 15, "Executing (Release 2)": 41, "Monitoring & Controlling (Release 2)": 8,
  "Closing (Transition)": 7, "Closing (Final)": 4,
};
const TOTAL_BEAT_WEIGHT = Object.values(PHASE_BEAT_WEIGHTS).reduce((a, b) => a + b, 0);

function overallProgressPercent(currentPhase) {
  const idx = PHASE_ORDER.indexOf(currentPhase);
  if (idx === -1) return 0;

  // Sum of weights for every phase fully completed (all phases before the current one)
  let completedWeight = 0;
  for (let i = 0; i < idx; i++) {
    completedWeight += PHASE_BEAT_WEIGHTS[PHASE_ORDER[i]];
  }

  // Fractional progress through the CURRENT phase, estimated from how many
  // beats in `history` belong to this phase vs. this phase's total weight.
  // Capped at 95% of the phase's own weight so the bar never claims a phase
  // is fully done until the player actually leaves it (avoids a bar that
  // reads 100% while still showing content from that phase).
  const beatsInCurrentPhase = history.filter(bid => {
    const b = BEATS[bid];
    return b && b.phase === currentPhase;
  }).length;
  const phaseWeight = PHASE_BEAT_WEIGHTS[currentPhase] || 1;
  const phaseFraction = Math.min(0.95, beatsInCurrentPhase / phaseWeight);
  const currentPhaseContribution = phaseFraction * phaseWeight;

  const percent = ((completedWeight + currentPhaseContribution) / TOTAL_BEAT_WEIGHT) * 100;
  return Math.max(1, Math.min(99, Math.round(percent))); // never show a bare 0% or a premature 100%
}

function overallProgressBarHTML(currentPhase) {
  const pct = overallProgressPercent(currentPhase);
  return `
    <div class="overall-progress">
      <div class="overall-progress-track">
        <div class="overall-progress-fill" style="width: ${pct}%"></div>
      </div>
      <div class="overall-progress-label">${pct}% through the course</div>
    </div>
  `;
}

};
function countWords(str) {
  if (!str) return 0;
  return str.trim().split(/\s+/).filter(Boolean).length;
}

function countPopulatedRows(rows) {
  if (!Array.isArray(rows)) return 0;
  return rows.filter(row =>
    Array.isArray(row) && row.some(cell => (cell || "").trim().length > 0)
  ).length;
}

function containsKeyword(str, keywords) {
  if (!str || !keywords || keywords.length === 0) return null; // N/A
  const lower = str.toLowerCase();
  return keywords.some(k => lower.includes(k.toLowerCase()));
}

// Score a single field. Returns { score: 0-1, checks: {...} }
function scoreField(fieldDef, value) {
  const checks = {};
  let applicable = [];

  // --- Completeness ---
  let hasContent;
  if (fieldDef.type === "table") {
    const rows = value || [];
    hasContent = countPopulatedRows(rows) > 0;
  } else {
    hasContent = !!(value && value.trim().length > 0);
  }
  checks.completeness = hasContent;
  applicable.push(hasContent ? 1 : 0);

  // --- Depth ---
  let depthOk = null;
  if (fieldDef.type === "table") {
    const rows = value || [];
    const populated = countPopulatedRows(rows);
    depthOk = populated >= (fieldDef.minRows || 1);
    checks.depth = depthOk;
    applicable.push(depthOk ? 1 : 0);
  } else if (fieldDef.minWords) {
    const words = countWords(value);
    depthOk = words >= fieldDef.minWords;
    checks.depth = depthOk;
    applicable.push(depthOk ? 1 : 0);
  }

  // --- Keyword relevance (only if defined) ---
  if (fieldDef.keywords && fieldDef.type !== "table") {
    const kwOk = containsKeyword(value, fieldDef.keywords);
    checks.keywords = kwOk;
    applicable.push(kwOk ? 1 : 0);
  } else if (fieldDef.keywords && fieldDef.type === "table") {
    // For tables, check keyword presence across all cells
    const flat = (value || []).flat().join(" ");
    const kwOk = containsKeyword(flat, fieldDef.keywords);
    checks.keywords = kwOk;
    applicable.push(kwOk ? 1 : 0);
  }

  const score = applicable.length > 0
    ? applicable.reduce((a, b) => a + b, 0) / applicable.length
    : 0;

  return { score, checks };
}

// Score an entire form submission.
// formDef: { fields: [...] }
// submission: { fieldId: value, ... }
// Returns: { score: 0-100, fieldResults: {...}, strengths: [...], weaknesses: [...] }
function scoreForm(formDef, submission) {
  const requiredFields = formDef.fields.filter(f => f.required);
  const optionalFields = formDef.fields.filter(f => !f.required);

  let weightedTotal = 0;
  const fieldResults = {};
  const strengths = [];
  const weaknesses = [];
  const weaknessHints = []; // parallel array: hint text for each weakness

  for (const field of requiredFields) {
    const value = submission[field.id];
    const result = scoreField(field, value);
    fieldResults[field.id] = result;
    weightedTotal += result.score;

    if (result.score >= 0.8) {
      strengths.push(field.label);
    } else if (result.score < 0.5) {
      weaknesses.push(field.label);
      // Include the field's coaching hint if defined, otherwise null
      weaknessHints.push(field.hint || null);
    }
  }

  let baseScore = requiredFields.length > 0
    ? (weightedTotal / requiredFields.length) * 100
    : 0;

  // Optional field bonus: up to +5 total, only if required fields are
  // reasonably complete (baseScore >= 50) so optional content can't
  // mask missing required content.
  let bonus = 0;
  if (baseScore >= 50 && optionalFields.length > 0) {
    let optionalHits = 0;
    for (const field of optionalFields) {
      const value = submission[field.id];
      const result = scoreField(field, value);
      fieldResults[field.id] = result;
      if (result.score >= 0.6) optionalHits++;
    }
    bonus = Math.min(5, (optionalHits / optionalFields.length) * 5);
  }

  const finalScore = Math.min(100, Math.round(baseScore + bonus));

  return {
    score: finalScore,
    fieldResults,
    strengths,
    weaknesses,
    weaknessHints,
  };
}

// Map a form's domains to meter deltas based on score.
// domains: array like ["Finance"] or ["Governance", "Risk"]
const DOMAIN_TO_METER = {
  "Finance": "value",
  "Schedule": "flow",
  "Risk": "risk",
  "Quality": "quality",
  "Governance": "trust",
  "Scope": "trust",
  "Stakeholders": "trust",
  "Resources": "trust",
  "Team": "teamHealth",
};

function scoreToDelta(score) {
  if (score >= 85) return 3;
  if (score >= 70) return 1;
  if (score >= 50) return 0;
  if (score >= 30) return -2;
  return -4;
}

// Returns { meterKey: delta, ... } — may have multiple meters if domains
// map to more than one, or if a form has 2 domains mapping to 2 different
// meters (e.g. Governance+Finance -> trust + value both get the delta).
function getMeterDeltas(domains, score) {
  const delta = scoreToDelta(score);
  const meters = new Set();
  for (const d of domains) {
    const meter = DOMAIN_TO_METER[d];
    if (meter) meters.add(meter);
  }
  const result = {};
  for (const m of meters) {
    result[m] = delta;
  }
  return result;
}

// Generate human-readable feedback summary for a submission.
function generateFeedback(formResult, artifactName) {
  const { score, strengths, weaknesses } = formResult;
  let tier;
  if (score >= 85) tier = "Strong";
  else if (score >= 70) tier = "Solid";
  else if (score >= 50) tier = "Adequate";
  else if (score >= 30) tier = "Weak";
  else tier = "Incomplete";

  let summary = `${tier} submission for ${artifactName} (${score}/100).`;
  if (strengths.length > 0) {
    summary += ` Strong on: ${strengths.join(", ")}.`;
  }
  if (weaknesses.length > 0) {
    summary += ` Needs more depth on: ${weaknesses.join(", ")}.`;
  }
  return summary;
}
